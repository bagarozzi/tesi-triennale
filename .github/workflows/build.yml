name: Scheduled Release

on:
  schedule:
    - cron: '0 12 * * 0'  # ogni domenica alle 12:00 UTC
  workflow_dispatch:       # permette anche l'esecuzione manuale

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install TeX and Arara
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full curl unzip
          tlmgr init-usertree
          tlmgr install arara

      - name: Compile Thesis
        run: arara tesi.tex

      - name: Create tag
        id: tag
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "TAG=v$DATE" >> $GITHUB_ENV
          git tag "v$DATE"
          git push origin "v$DATE"

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          name: "Release ${{ env.TAG }}"
          files: tesi.pdf
